<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订阅成功 - AI Radar</title>
  <style>
    :root { --bg: #0d1117; --panel-bg: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --green: #238636; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 500px; width: 100%; text-align: center; }
    .card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 40px 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: var(--green); margin-bottom: 12px; }
    p { color: #8b949e; line-height: 1.6; margin-bottom: 24px; }
    .back-btn { display: inline-block; padding: 12px 24px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; transition: background 0.2s; }
    .back-btn:hover { background: #79c0ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="success-icon">✅</div>
      <h1>订阅成功！</h1>
      <p>感谢你的订阅。你将在每天早晨 8:00 收到 AI Radar 每日摘要。<br>第一封邮件将在下一个推送周期发送。</p>
      <a href="./graph.html" class="back-btn">返回知识图谱</a>
    </div>
  </div>
</body>
</html>
