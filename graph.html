<!DOCTYPE html>

<style>
  :root { --bg: #0d1117; --panel-bg: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  
  /* Header */
  #header { position: absolute; top: 0; left: 0; right: 0; height: 56px; padding: 0 20px; background: rgba(13,17,23,0.95); backdrop-filter: blur(10px); z-index: 20; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #21262d; }
  #header h1 { font-size: 18px; color: var(--accent); font-weight: 700; display: flex; align-items: center; gap: 8px; }
  #header-controls { display: flex; align-items: center; gap: 12px; }
  #stats span { background: #21262d; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-family: monospace; border: 1px solid #30363d; }
  #toggle-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  #toggle-btn:hover { background: var(--border); color: #fff; }
  
  /* Network Area */
  #mynetwork { width: 100%; height: 100vh; cursor: grab; }
  #mynetwork:active { cursor: grabbing; }
  
  /* Dashboard - Left Side */
  #dashboard {
    position: absolute; top: 64px; left: 20px; width: 300px; max-height: calc(100vh - 80px); overflow-y: auto;
    background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; z-index: 15; box-shadow: 0 4px 20px rgba(0,0,0,0.5);

  #dashboard.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }
  
  .dash-header { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }

  /* Legend - Bottom Left */
  #legend { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(22,27,34,0.9); padding: 10px 14px; border-radius: 8px; font-size: 12px; border: 1px solid #30363d; backdrop-filter: blur(8px); }
  .legend-title { font-weight: 600; margin-bottom: 6px; color: #c9d1d9; font-size: 11px; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #8b949e; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  
  /* Detail Panel - Right Side */
  #detail-panel {
    position: absolute; top: 0; right: -400px; width: 380px; height: 100%; background: var(--panel-bg);
    border-left: 1px solid var(--border); z-index: 20; transition: right 0.3s ease; overflow-y: auto;
    display: flex; flex-direction: column; box-shadow: -5px 0 30px rgba(0,0,0,0.5);
  }
  #detail-panel.active { right: 0; }
  
  .panel-header { padding: 20px; border-bottom: 1px solid #21262d; position: relative; }
  .panel-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #8b949e; font-size: 24px; cursor: pointer; }
  .panel-close:hover { color: #fff; }
  .panel-title { font-size: 16px; color: var(--accent); line-height: 1.4; margin-right: 30px; font-weight: 600; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { background: #21262d; padding: 3px 8px; border-radius: 12px; font-size: 11px; color: #c9d1d9; border: 1px solid #30363d; }
  .tag.pillar { background: rgba(63,185,80,0.2); color: #3fb950; border-color: #238636; }
  .tag.date { background: rgba(255,255,255,0.05); color: #c9d1d9; }
  .tag.score { background: rgba(88,166,255,0.1); color: #58a6ff; border-color: rgba(88,166,255,0.3); }
  
  .panel-body { padding: 20px; flex: 1; }
  .panel-section { margin-bottom: 20px; }
  .section-title { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
  .section-content { font-size: 14px; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  
  .panel-actions { padding: 16px; border-top: 1px solid #21262d; background: #161b22; }
  .action-btn { display: block; width: 100%; padding: 12px; border-radius: 6px; background: #238636; color: #fff; text-align: center; text-decoration: none; font-weight: 500; font-size: 14px; transition: background 0.2s; }
  .action-btn:hover { background: #2ea043; }
  .action-btn.disabled { background: #30363d; color: #8b949e; cursor: not-allowed; pointer-events: none; }
</style>

  <script src="./vis-network.min.js"></script>
  <script>
    const data = JSON.parse(document.getElementById('graph-data').textContent);
    const pillarColors = { capabilities: '#58a6ff', patterns: '#3fb950', ecosystem: '#a371f7', business: '#f0883e', unknown: '#8b949e' };
    const pillarNames = { capabilities: '🤖 技术能力', patterns: '📱 产品模式', ecosystem: '🔧 工具生态', business: '💰 商业趋势', unknown: '未分类' };
    let network;

    // 1. Render Dashboard
    function renderDashboard() {
      const today = new Date().toISOString().slice(0, 10);
      // Filter nodes created/updated today or having today's date
      const todayNodes = data.nodes.filter(n => n.date && n.date.startsWith(today));
      const topNodes = [...todayNodes].sort((a, b) => (b.pm_score || 0) - (a.pm_score || 0)).slice(0, 10);
      
      const list = document.getElementById('dash-list');
      if (topNodes.length === 0) {
        list.innerHTML = '<div style="color:#8b949e; font-size:12px; text-align:center; padding:20px;">今日暂无新情报</div>';
        return;
      }
      
      list.innerHTML = topNodes.map(n => {
        const color = pillarColors[n.pillar] || '#8b949e';
        const name = pillarNames[n.pillar] || n.pillar;
        const summary = (n.summary || "暂无中文摘要").substring(0, 100);
        const score = (n.pm_score || 0).toFixed(2);
        return `
          <div class="dash-item" style="border-left-color: ${color}" onclick="focusNode('${n.id}')">
            <div class="item-title">${n.label}</div>
            <div class="item-meta">
              <span>${name}</span>
              <span class="item-score">PM ${score}</span>
            </div>
            <div class="item-summary">${summary}</div>
          </div>`;
      }).join('');
    }

    // 2. Render Network
    function renderNetwork() {
      const nodes = new vis.DataSet(data.nodes.map(n => ({
        id: n.id, 
        label: n.label.length > 18 ? n.label.slice(0, 18) + '...' : n.label,
        shape: 'dot', // Force circular dots
        size: Math.max(10, Math.min(25, (n.pm_score || 0.1) * 30 + 10)),
        color: { 
          background: pillarColors[n.pillar] || '#8b949e', 
          border: 'rgba(255,255,255,0.3)', 
          highlight: { background: pillarColors[n.pillar] || '#fff', border: '#fff' } 
        },
        font: { color: '#fff', size: 11, strokeWidth: 1.5, strokeColor: '#0d1117' },
        borderWidth: 2
      })));
      
      const edges = new vis.DataSet(data.edges.map(e => ({
        from: e.source, to: e.target,
        color: { color: e.type === 'PILLAR' ? 'rgba(63,185,80,0.25)' : 'rgba(139,148,158,0.15)' },
        width: e.type === 'PILLAR' ? 2 : 1,
        smooth: { type: 'curvedCW', roundness: 0.1 }
      })));
      
      network = new vis.Network(document.getElementById('mynetwork'), { nodes, edges }, {
        physics: { barnesHut: { gravitationalConstant: -3000, springLength: 150, springConstant: 0.04 }, stabilization: { iterations: 200 } },
        interaction: { hover: true, zoomView: true, dragView: true, dragNodes: true }
      });
      
      network.on('click', function(params) {
        if (params.nodes.length > 0) showPanel(params.nodes[0]);
        else hidePanel();
      });
      
      document.getElementById('node-count').textContent = data.nodes.length;
      document.getElementById('edge-count').textContent = data.edges.length;
    }

    // 3. Show Panel Logic
    function showPanel(nodeId) {
      const node = data.nodes.find(n => n.id === nodeId);
      if (!node) return;
      
      // Title
      document.getElementById('panel-title').textContent = node.label;
      
      // Tags
      const tagsHtml = [];
      if (node.pillar) tagsHtml.push(`<span class="tag pillar">${pillarNames[node.pillar] || node.pillar}</span>`);
      if (node.date) tagsHtml.push(`<span class="tag date">📅 ${node.date}</span>`);
      if (node.pm_score) tagsHtml.push(`<span class="tag score">🎯 ${node.pm_score}</span>`);
      document.getElementById('panel-tags').innerHTML = tagsHtml.join('');
      
      // Summary - ensure it's populated
      let summary = node.summary;
      if (!summary || summary === "") {
        // Fallback if summary is missing
        if (node.type === 'paper') summary = "这是一篇学术研究论文。摘要暂缺，建议点击原文查看。";
        else if (node.type === 'hn') summary = "这是一个 Hacker News 讨论话题。摘要暂缺。";
        else summary = "暂无详细摘要信息，建议点击原文查看详细内容。";
      }
      document.getElementById('panel-summary').textContent = summary;
      
      // Link Button
      const linkBtn = document.getElementById('panel-link');
      if (node.url) { 
        linkBtn.href = node.url; 
        linkBtn.classList.remove('disabled');
        linkBtn.style.display = 'block'; 
      } else { 
        linkBtn.style.display = 'none'; 
      }
      
      document.getElementById('detail-panel').classList.add('active');
    }

    function hidePanel() { document.getElementById('detail-panel').classList.remove('active'); }
    
    function focusNode(id) { 
      network.selectNodes([id]); 
      network.focus(id, { scale: 1.2, animation: { duration: 500, easingFunction: 'easeInOutQuad' } }); 
      showPanel(id); 
    }
    
    // Toggle Dashboard
    function toggleDashboard() {
      const dash = document.getElementById('dashboard');
      const btn = document.getElementById('toggle-btn');
      if (dash.classList.contains('hidden')) {
        dash.classList.remove('hidden');
        btn.innerHTML = '📅 收起摘要';
      } else {
        dash.classList.add('hidden');
        btn.innerHTML = '📅 展开摘要';
      }
    }

    // Init
    renderDashboard();
    renderNetwork();
  </script>
