<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Knowledge Graph</title>
<!-- SEO & Social -->
<meta name="description" content="AI Radar Wiki — Automated knowledge base for AI product managers. 4-pillar system with interactive graph.">
<meta property="og:type" content="website">
<meta property="og:title" content="AI Radar Knowledge Graph">
<meta property="og:description" content="Automated AI knowledge base for product managers — 4 pillars, interactive graph, self-evolving.">
<meta property="og:url" content="https://ttmens.github.io/ai-radar-wiki/graph.html">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"Dataset","name":"AI Radar Knowledge Graph","url":"https://ttmens.github.io/ai-radar-wiki/graph.html"}</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #header { position: absolute; top: 0; left: 0; right: 0; height: 56px; padding: 0 20px; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); z-index: 10; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #21262d; }
  #header h1 { font-size: 18px; color: #58a6ff; font-weight: 700; }
  #stats span { background: #21262d; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-left: 10px; font-family: monospace; }
  #mynetwork { width: 100%; height: 100vh; }
  #legend { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(13,17,23,0.9); padding: 12px; border-radius: 8px; font-size: 12px; border: 1px solid #21262d; backdrop-filter: blur(8px); }
  .legend-item { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  #detail-panel { position: absolute; top: 0; right: -420px; width: 400px; height: 100%; background: #161b22; border-left: 1px solid #30363d; z-index: 20; transition: right 0.3s ease; overflow-y: auto; box-shadow: -5px 0 30px rgba(0,0,0,0.5); }
  #detail-panel.active { right: 0; }
  .panel-header { padding: 20px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: start; }
  .panel-header h2 { color: #58a6ff; font-size: 18px; line-height: 1.4; margin-right: 10px; }
  .panel-close { background: none; border: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0 5px; line-height: 1; }
  .panel-close:hover { color: #fff; }
  .panel-body { padding: 20px; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .panel-tag { background: #21262d; padding: 3px 10px; border-radius: 12px; font-size: 11px; color: #58a6ff; border: 1px solid #30363d; }
  .panel-tag.pillar { background: #1a3a2a; color: #3fb950; border-color: #238636; }
  .panel-tag.score { background: #3a2a1a; color: #f0883e; border-color: #bd5000; }
  .panel-section { margin-bottom: 16px; }
  .panel-section h3 { font-size: 13px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-section p { font-size: 14px; line-height: 1.6; color: #c9d1d9; }
  .panel-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric { background: #21262d; padding: 12px; border-radius: 8px; text-align: center; }
  .metric-value { font-size: 20px; font-weight: 700; color: #58a6ff; }
  .metric-label { font-size: 11px; color: #8b949e; margin-top: 4px; }
  .panel-actions { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid #21262d; }
  .panel-btn { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px; text-decoration: none; text-align: center; font-weight: 500; }
  .panel-btn:hover { background: #30363d; }
  .panel-btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
  .panel-btn.primary:hover { background: #2ea043; }
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #58a6ff; font-size: 18px; z-index: 20; }
</style>
</head>
<body>
  <div id="header"><h1>🧠 AI Radar Knowledge Graph</h1><div id="stats"><span id="node-count">Nodes: 0</span><span id="edge-count">Edges: 0</span></div></div>
  <div id="mynetwork"><div id="loading">Loading Graph...</div></div>
  <div id="legend">
    <div class="legend-item"><span class="dot" style="background:#58a6ff"></span> Project</div>
    <div class="legend-item"><span class="dot" style="background:#3fb950"></span> Concept</div>
    <div class="legend-item"><span class="dot" style="background:#f0883e"></span> Paper</div>
    <div class="legend-item"><span class="dot" style="background:#bc8cff"></span> Company</div>
    <div class="legend-item"><span class="dot" style="background:#f778ba"></span> Discussion</div>
  </div>
  <div id="detail-panel">
    <div class="panel-header"><h2 id="panel-title">Node</h2><button class="panel-close" onclick="hidePanel()">×</button></div>
    <div class="panel-body">
      <div class="panel-tags" id="panel-tags"></div>
      <div class="panel-metrics" id="panel-metrics"></div>
      <div class="panel-section"><h3>Summary</h3><p id="panel-desc">No summary available.</p></div>
      <div class="panel-section" id="panel-authors-section" style="display:none"><h3>Authors</h3><p id="panel-authors"></p></div>
    </div>
    <div class="panel-actions" id="panel-actions"></div>
  </div>
  <script src="./vis-network.min.js"></script>
  <script>
    const pillarColors = { 'capabilities': '#58a6ff', 'patterns': '#3fb950', 'ecosystem': '#a371f7', 'business': '#f0883e', 'unknown': '#8b949e' };
    const typeColors = { project: '#58a6ff', concept: '#3fb950', paper: '#f0883e', company: '#bc8cff', discussion: '#f778ba', product: '#f778ba' };
    let network, graphData;
    function loadGraphData() {
      fetch('./graph.json?' + Date.now()).then(r => r.json()).then(renderGraph).catch(err => { document.getElementById('loading').innerHTML = 'Failed: ' + err.message; });
    }
    function renderGraph(data) {
      graphData = data;
      document.getElementById('node-count').textContent = 'Nodes: ' + data.nodes.length;
      document.getElementById('edge-count').textContent = 'Edges: ' + data.edges.length;
      document.getElementById('loading').style.display = 'none';
      const nodes = new vis.DataSet(data.nodes.map(function(n) {
        return { id: n.id, label: n.label.length > 20 ? n.label.slice(0, 20) + '...' : n.label, shape: 'dot', size: n.type === 'paper' ? 25 : (n.stars ? Math.max(12, Math.min(35, n.stars / 300 + 12)) : 18), color: { background: pillarColors[n.pillar] || typeColors[n.type] || '#8b949e', border: 'rgba(255,255,255,0.4)', highlight: { background: pillarColors[n.pillar] || typeColors[n.type] || '#fff', border: '#fff' } }, font: { color: '#fff', size: 13, strokeWidth: 2, strokeColor: '#0d1117' }, borderWidth: 2, title: n.label + '\nPM Score: ' + (n.pm_score || 'N/A') };
      }));
      const edges = new vis.DataSet(data.edges.map(function(e) {
        return { from: e.source, to: e.target, color: { color: e.type === 'PILLAR' ? 'rgba(63,185,80,0.15)' : 'rgba(139,148,158,0.12)' }, width: e.type === 'PILLAR' ? 1.5 : 1, smooth: { type: 'curvedCW', roundness: 0.1 } };
      }));
      network = new vis.Network(document.getElementById('mynetwork'), { nodes: nodes, edges: edges }, { physics: { barnesHut: { gravitationalConstant: -4000, springLength: 160, springConstant: 0.015 }, stabilization: { iterations: 200, fit: true } }, interaction: { hover: true, tooltipDelay: 50, zoomView: true, dragView: true, dragNodes: true } });
      network.on('click', function(params) {
        if (params.nodes.length > 0) { const node = data.nodes.find(function(n) { return n.id === params.nodes[0]; }); if (node) showPanel(node); } else { hidePanel(); }
      });
    }
    function showPanel(node) {
      document.getElementById('panel-title').textContent = node.label;
      var tags = (node.tags || []).map(function(t) { return '<span class="panel-tag">' + t + '</span>'; }).join('');
      var pillarTag = (node.pillar && node.pillar !== 'unknown') ? '<span class="panel-tag pillar">🏷️ ' + node.pillar + '</span>' : '';
      var scoreTag = node.pm_score ? '<span class="panel-tag score">🎯 ' + node.pm_score + '</span>' : '';
      document.getElementById('panel-tags').innerHTML = pillarTag + scoreTag + tags;
      var metrics = [];
      if (node.stars) metrics.push('<div class="metric"><div class="metric-value">⭐ ' + node.stars + '</div><div class="metric-label">Stars</div></div>');
      if (node.score) metrics.push('<div class="metric"><div class="metric-value">🔥 ' + node.score + '</div><div class="metric-label">HN Score</div></div>');
      if (node.comments) metrics.push('<div class="metric"><div class="metric-value">💬 ' + node.comments + '</div><div class="metric-label">Comments</div></div>');
      document.getElementById('panel-metrics').innerHTML = metrics.join('');
      document.getElementById('panel-desc').textContent = node.summary || "No summary available.";
      var as = document.getElementById('panel-authors-section');
      if (node.authors && node.authors.length > 0) { as.style.display = 'block'; document.getElementById('panel-authors').textContent = node.authors.join(', '); } else { as.style.display = 'none'; }
      var actions = document.getElementById('panel-actions'); actions.innerHTML = '';
      if (node.url) actions.innerHTML += '<a href="' + node.url + '" target="_blank" class="panel-btn primary">View Source ↗</a>';
      var wd = (node.type === 'paper') ? 'concepts' : 'entities';
      actions.innerHTML += '<a href="https://ttmens.github.io/ai-radar-wiki/' + wd + '/' + node.id + '.md" target="_blank" class="panel-btn">View Wiki ↗</a>';
      document.getElementById('detail-panel').classList.add('active');
    }
    function hidePanel() { document.getElementById('detail-panel').classList.remove('active'); }
    loadGraphData();
  </script>
</body>
</html>
