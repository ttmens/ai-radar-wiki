<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; overflow: hidden; }
  
  #header {
    position: absolute; top: 0; left: 0; right: 0; height: 56px; padding: 0 20px;
    background: rgba(13,17,23,0.8); backdrop-filter: blur(8px); z-index: 10;
    display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #21262d;
  }
  #header h1 { font-size: 16px; color: #58a6ff; font-weight: 600; }
  #stats span { background: #21262d; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 10px; }
  
  #graph { width: 100%; height: 100vh; }
  
  #legend {
    position: absolute; bottom: 20px; left: 20px; z-index: 10;
    background: rgba(13,17,23,0.8); padding: 10px; border-radius: 8px; font-size: 12px; border: 1px solid #21262d;
  }
  .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
  <div id="header">
    <h1>🧠 AI Radar Knowledge Graph</h1>
    <div id="stats">Loading...</div>
  </div>
  
  <div id="graph"></div>
  
  <div id="legend">
    <div class="item"><span class="dot" style="background:#58a6ff"></span> Project</div>
    <div class="item"><span class="dot" style="background:#3fb950"></span> Concept</div>
    <div class="item"><span class="dot" style="background:#f0883e"></span> Paper</div>
    <div class="item"><span class="dot" style="background:#bc8cff"></span> Company</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    const chart = echarts.init(document.getElementById('graph'));
    const colors = { project: '#58a6ff', concept: '#3fb950', paper: '#f0883e', company: '#bc8cff' };
    
    // Force refresh graph.json
    fetch('./graph.json?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('Network response was not ok');
        return r.json();
      })
      .then(data => {
        document.getElementById('stats').innerHTML = 
          `<span>Nodes: ${data.nodes.length}</span><span>Edges: ${data.edges.length}</span>`;
        
        // Convert to ECharts format
        const nodes = data.nodes.map(n => ({
          id: n.id,
          name: n.label.length > 25 ? n.label.slice(0, 25) + '...' : n.label,
          symbolSize: n.type === 'paper' ? 25 : (n.stars ? n.stars / 50 + 10 : 20),
          itemStyle: { color: colors[n.type] || '#8b949e' },
          category: n.type,
          value: n.label, // For tooltip
          url: n.url
        }));
        
        const links = data.edges.map(e => ({
          source: e.source,
          target: e.target,
          label: { show: false } // Hide edge labels to reduce clutter
        }));
        
        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(p) {
              if (p.dataType === 'node') {
                return `<div style="max-width:200px"><b>${p.data.value}</b><br><a href="${p.data.url}" target="_blank" style="color:#58a6ff">View Details ↗</a></div>`;
              }
              return p.data.source + ' → ' + p.data.target;
            }
          },
          legend: [{
            data: ['Project', 'Concept', 'Paper', 'Company'],
            orient: 'vertical',
            right: 10,
            top: 60,
            textStyle: { color: '#c9d1d9' }
          }],
          series: [{
            type: 'graph',
            layout: 'force',
            force: { repulsion: 400, edgeLength: 100, gravity: 0.1 },
            data: nodes,
            links: links,
            categories: [
              { name: 'Project' }, { name: 'Concept' }, { name: 'Paper' }, { name: 'Company' }
            ],
            roam: true,
            label: { show: true, position: 'right', color: '#c9d1d9', fontSize: 12 },
            lineStyle: { color: '#484f58', width: 2, curveness: 0.3 },
            emphasis: { focus: 'adjacency', lineStyle: { width: 4 } }
          }]
        };
        
        chart.setOption(option);
        
        // Handle resize
        window.addEventListener('resize', () => chart.resize());
        
        // Click open link
        chart.on('click', function(params) {
          if (params.dataType === 'node' && params.data.url) {
            window.open(params.data.url, '_blank');
          }
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById('stats').innerHTML = '<span style="color:red">Load Failed</span>';
        document.getElementById('graph').innerHTML = '<p style="color:red;text-align:center;padding:50px">Failed to load graph data. Check console.</p>';
      });
  </script>
</body>
</html>
