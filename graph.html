<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Knowledge Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
  #header h1 { font-size: 18px; color: #58a6ff; }
  #stats { font-size: 13px; color: #8b949e; }
  #graph { width: 100%; height: calc(100vh - 60px); }
  .legend { position: fixed; bottom: 16px; left: 16px; background: rgba(13,17,23,0.9); padding: 12px; border-radius: 8px; font-size: 12px; border: 1px solid #21262d; }
  .legend div { margin: 4px 0; }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
</style>
</head>
<body>
<div id="header">
  <h1>🔗 AI Radar Knowledge Graph</h1>
  <div id="stats">Nodes: 12 | Edges: 0</div>
</div>
<div id="graph"></div>
<div class="legend">
  <div><span class="dot" style="background:#58a6ff"></span> Project</div>
  <div><span class="dot" style="background:#3fb950"></span> Concept</div>
  <div><span class="dot" style="background:#f0883e"></span> Paper</div>
  <div><span class="dot" style="background:#bc8cff"></span> Company</div>
</div>
<script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<script>
const nodesData = [{"id": "a-closed-form-adaptive-landmark-kernel-f", "label": "A Closed-Form Adaptive-Landmark Kernel for Certified Point-Cloud and Graph Class", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04046v1", "authors": ["Sushovan Majhi", "Atish Mitra", "Žiga Virk", "Pramita Bagchi"]}, {"id": "safety-and-accuracy-follow-different-sca", "label": "Safety and accuracy follow different scaling laws in clinical large language mod", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04039v1", "authors": ["Sebastian Wind", "Tri-Thien Nguyen", "Jeta Sopa", "Mahshad Lotfinia", "Sebastian Bickelhaup"]}, {"id": "openseeker-v2-pushing-the-limits-of-sea", "label": "OpenSeeker-v2: Pushing the Limits of Search Agents with Informative and High-Dif", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04036v1", "authors": ["Yuwen Du", "Rui Ye", "Shuo Tang", "Keduan Huang", "Xinyu Zhu"]}, {"id": "large-scale-high-quality-3d-gaussian-hea", "label": "Large-Scale High-Quality 3D Gaussian Head Reconstruction from Multi-View Capture", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04035v1", "authors": ["Evangelos Ntavelis", "Sean Wu", "Mohamad Shahbazi", "Fabio Maninchedda", "Dmitry Kostiaev"]}, {"id": "redefining-ai-red-teaming-in-the-agentic", "label": "Redefining AI Red Teaming in the Agentic Era: From Weeks to Hours", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04019v1", "authors": ["Raja Sekhar Rao Dheekonda", "Will Pearce", "Nick Landers"]}, {"id": "conditional-diffusion-sampling", "label": "Conditional Diffusion Sampling", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04013v1", "authors": ["Francisco M. Castro-Macías", "Pablo Morales-Álvarez", "Saifuddin Syed", "Daniel Hernández-Lobato", "Rafael Molina"]}, {"id": "symptomai-towards-a-conversational-ai-a", "label": "SymptomAI: Towards a Conversational AI Agent for Everyday Symptom Assessment", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04012v1", "authors": ["Joseph Breda", "Fadi Yousif", "Beszel Hawkins", "Marinela Cotoi", "Miao Liu"]}, {"id": "enhanced-3d-brain-tumor-segmentation-usi", "label": "Enhanced 3D Brain Tumor Segmentation Using Assorted Precision Training", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04008v1", "authors": ["Adwaitt Pandya", "Ozioma C. Oguine", "Harita Bhargava", "Shrikant Zade"]}, {"id": "physics-grounded-multi-agent-architectur", "label": "Physics-Grounded Multi-Agent Architecture for Traceable, Risk-Aware Human-AI Dec", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.04003v1", "authors": ["Danny Hoang", "Ryan Matthiessen", "Christopher Miller", "Nasir Mannan", "Ruby ElKharboutly"]}, {"id": "an-agent-oriented-pluggable-experience-r", "label": "An Agent-Oriented Pluggable Experience-RAG Skill for Experience-Driven Retrieval", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.03989v1", "authors": ["Dutao Zhang", "Tian Liao"]}, {"id": "from-intent-to-execution-composing-agen", "label": "From Intent to Execution: Composing Agentic Workflows with Agent Recommendation", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.03986v1", "authors": ["Kishan Athrey", "Ramin Pishehvar", "Brian Riordan", "Mahesh Viswanathan"]}, {"id": "flow-sampling-learning-to-sample-from-u", "label": "Flow Sampling: Learning to Sample from Unnormalized Densities via Denoising Cond", "type": "paper", "tags": ["research"], "url": "http://arxiv.org/abs/2605.03984v1", "authors": ["Aaron Havens", "Brian Karrer", "Neta Shaul"]}];
const edgesData = [];
const typeColors = { project: '#58a6ff', concept: '#3fb950', paper: '#f0883e', company: '#bc8cff' };
const networkNodes = nodesData.map(n => ({
  id: n.id, label: n.label, color: { background: typeColors[n.type] || '#8b949e', border: 'transparent' },
  font: { color: '#c9d1d9', size: 14 }, shape: 'dot', size: Math.max(10, Math.min(30, (n.stars || 0) / 100 + 10)),
  title: n.url ? `<a href="${n.url}" target="_blank" style="color:#58a6ff">${n.label}</a>` : n.label
}));
const networkEdges = edgesData.map(e => ({
  from: e.source, to: e.target, label: e.relation, color: { color: 'rgba(139,148,158,0.3)' },
  font: { color: '#8b949e', size: 10, align: 'horizontal' }, smooth: { type: 'curvedCW', roundness: 0.15 }
}));
const container = document.getElementById('graph');
const data = { nodes: new vis.DataSet(networkNodes), edges: new vis.DataSet(networkEdges) };
const options = {
  physics: { enabled: true, stabilization: { iterations: 100 } },
  interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true },
  layout: { improvedLayout: true }
};
new vis.Network(container, data, options);
</script>
</body>
</html>
