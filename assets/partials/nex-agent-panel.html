  <div id="agent-scrim" class="nex-agent-scrim" hidden aria-hidden="true"></div>
  <div id="agent-panel" class="nex-agent-panel" role="dialog" aria-labelledby="agent-panel-title" aria-modal="true" aria-hidden="true">
    <div class="nex-agent-panel-head">
      <button type="button" class="nex-agent-back-btn" id="agent-back-btn" onclick="window.toggleAgentPanel()" aria-label="返回" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        <span class="nex-agent-back-label">返回</span>
      </button>
      <h2 id="agent-panel-title">智瞰问答</h2>
      <button type="button" class="nex-agent-panel-close" id="agent-panel-close" aria-label="关闭">✕</button>
    </div>
    <div class="nex-agent-panel-body">
      <div id="nex-agent-frame-wrap" class="nex-agent-frame-wrap" hidden>
        <iframe id="nex-agent-frame" class="nex-agent-frame" title="智瞰问答"></iframe>
      </div>
      <div id="nex-agent-scaffold" class="nex-agent-scaffold">
        <div class="nex-agent-mid">
          <div id="nex-agent-thread" class="nex-agent-thread nex-agent-thread--idle" role="log" aria-live="polite" aria-relevant="additions" aria-label="对话">
            <div class="nex-agent-empty" id="nex-agent-empty">
              <p class="nex-agent-empty-title">向智瞰提问</p>
              <p class="nex-agent-empty-desc">用自然语言浏览简报与图谱。应答基于本站情报数据。</p>
            </div>
          </div>
          <div id="nex-agent-chips" class="nex-agent-chips" aria-label="建议问题"></div>
        </div>
        <footer class="nex-agent-composer-wrap">
          <div class="nex-agent-composer-inner">
            <label for="nex-agent-input" class="nex-sr-only">输入问题</label>
            <textarea id="nex-agent-input" class="nex-agent-input" rows="1" placeholder="问问今日情报…" autocomplete="off"></textarea>
            <button type="button" class="nex-agent-send" id="nex-agent-send" aria-label="发送">
              <svg class="nex-agent-send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              <svg class="nex-agent-stop-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
        </footer>
      </div>
    </div>
  </div>
  <button type="button" id="nex-agent-fab" class="nex-agent-fab" aria-controls="agent-panel">问&nbsp;AI</button>
