<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f7fa">
<title>AI Radar · 每日深度</title>
<link rel="icon" href="./assets/nexsight-mark.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-hover: #f0f2f5;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.12);
    --ink: #1a1a1a;
    --ink-soft: #555555;
    --ink-muted: #999999;
    --accent: #ff385c;
    --accent-soft: rgba(255,56,92,0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== Header (matches graph.html) ===== */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--ink);
  }

  .header-brand svg { width: 24px; height: 24px; }

  .header-brand h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .header-brand h1 span {
    color: var(--ink-muted);
    font-weight: 400;
    margin-left: 4px;
    font-size: 12px;
  }

  .header-right {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100vh;
    padding-top: 52px;
  }

  /* ===== Sidebar (Article List) ===== */
  .sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    box-shadow: 1px 0 4px rgba(0,0,0,0.02);
    -webkit-overflow-scrolling: touch;
  }

  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .sidebar-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 6px 4px 10px;
    font-weight: 600;
  }

  /* ===== Article Card ===== */
  .article-card {
    padding: 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    margin-bottom: 4px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .article-card:hover {
    background: var(--surface-hover);
    border-color: var(--border);
  }

  .article-card:active {
    background: var(--accent-soft);
    transform: scale(0.99);
  }

  .article-card.active {
    background: var(--accent-soft);
    border-color: rgba(255,56,92,0.15);
  }

  .article-date {
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .article-date .badge {
    background: var(--accent);
    color: #fff;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .article-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-overview {
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ===== Preview Pane ===== */
  .preview {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink-muted);
    text-align: center;
    padding: 40px;
  }

  .preview-empty svg {
    width: 48px;
    height: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
    color: var(--ink-muted);
  }

  .preview-empty h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }

  .preview-empty p {
    font-size: 12px;
    max-width: 240px;
  }

  /* ===== Loading ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
  }
  .empty-state p { font-size: 13px; }

  /* ===== Mobile back bar (hidden on desktop) ===== */
  .mobile-back-bar { display: none; }

  /* ===== Article Viewer ===== */
  .article-scroll-container {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .article-viewer {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px;
    background: var(--surface);
    box-shadow: var(--shadow-card);
    min-height: 100%;
    border-radius: 0;
  }

  /* Share button */
  .share-link-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 12px auto 16px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .share-link-btn:hover { background: var(--accent-soft); border-color: rgba(255,56,92,0.2); }
  .share-link-btn:active { transform: scale(0.98); }

  /* Toast notification */
  .share-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(26,26,26,0.92);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.25s ease;
    z-index: 9999;
    pointer-events: none;
  }
  .share-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== Mobile Responsive ===== */
  @media (max-width: 900px) {
    .app {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      min-width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
      box-shadow: none;
    }

    .preview {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app.show-article .preview {
      transform: translateX(0);
    }

    .header-right { display: none; }
    .header-brand h1 span { display: none; }

    /* Lightweight back bar on mobile */
    .mobile-back-bar {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      height: 44px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 91;
      display: flex;
      align-items: center;
      padding: 0 12px;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: all 0.25s ease;
    }

    .app.show-article .mobile-back-bar {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .mobile-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.15s;
    }

    .mobile-back-btn:active {
      background: var(--accent-soft);
    }

    .mobile-back-btn svg {
      width: 16px;
      height: 16px;
    }

    .article-viewer {
      padding: 24px 16px 100px;
    }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="./graph.html" class="header-brand" id="headerBrand" onclick="handleBrandClick(event)">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#ff385c" stroke-width="2"/>
      <circle cx="14" cy="14" r="5" fill="#ff385c"/>
    </svg>
    <h1>AI Radar<span>每日深度</span></h1>
  </a>
  <div class="header-right" id="headerStats"></div>
</header>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">文章归档</div>
    <div id="articleList"></div>
  </div>
  <div class="preview" id="preview">
    <div class="preview-empty" id="previewEmpty">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="8" y="4" width="48" height="56" rx="4"/>
        <line x1="16" y1="16" x2="48" y2="16"/>
        <line x1="16" y1="24" x2="40" y2="24"/>
        <line x1="16" y1="32" x2="44" y2="32"/>
        <line x1="16" y1="40" x2="36" y2="40"/>
      </svg>
      <h3>选择一篇文章</h3>
      <p>点击左侧列表查看文章详情</p>
    </div>
  </div>
</div>

<!-- Lightweight mobile back bar -->
<div class="mobile-back-bar" id="mobileBackBar">
  <button class="mobile-back-btn" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    返回列表
  </button>
</div>

<script>
// {{ARTICLES_DATA}}

let currentArticle = null;

function renderArticleList() {
  const list = document.getElementById('articleList');
  const stats = document.getElementById('headerStats');

  if (!ARTICLES || ARTICLES.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>暂无文章，明天 19:00 后将自动生成</p></div>';
    if (stats) stats.textContent = '';
    return;
  }

  if (stats) stats.textContent = ARTICLES.length + ' 篇文章';

  let html = '';
  ARTICLES.forEach(function(article, idx) {
    const isActive = currentArticle === idx ? ' active' : '';
    html += '<div class="article-card' + isActive + '" onclick="openArticle(' + idx + ')">';
    html += '<div class="article-date">';
    if (article.isLatest) html += '<span class="badge">最新</span>';
    html += article.date + '</div>';
    html += '<div class="article-title">' + escapeHtml(article.title) + '</div>';
    html += '<div class="article-overview">' + escapeHtml(article.overview || '') + '</div>';
    html += '</div>';
  });

  list.innerHTML = html;
}

function openArticle(idx, fromHash) {
  const article = ARTICLES[idx];
  if (!article) return;

  currentArticle = idx;
  renderArticleList();

  // Update URL hash (skip if opened from hash to avoid loop)
  if (!fromHash) {
    window.history.pushState({ articleIdx: idx }, '', '#' + article.id);
  }

  const preview = document.getElementById('preview');
  const empty = document.getElementById('previewEmpty');
  if (empty) empty.remove();

  preview.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

  try {
    const binary = atob(article.content);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const html = new TextDecoder('utf-8').decode(bytes);

    const container = document.createElement('div');
    container.className = 'article-viewer';
    container.innerHTML = html;

    const style = document.createElement('style');
    style.textContent = `
      .article-viewer h1 { font-size: 24px !important; font-weight: 700 !important; color: #1a1a1a !important; margin-bottom: 10px !important; letter-spacing: -0.02em !important; }
      .article-viewer h2 { font-size: 20px !important; font-weight: 600 !important; color: #1a1a1a !important; margin-top: 0 !important; margin-bottom: 10px !important; letter-spacing: -0.01em !important; }
      .article-viewer h3 { font-size: 17px !important; font-weight: 600 !important; color: #333 !important; margin-top: 24px !important; margin-bottom: 8px !important; }
      .article-viewer p { margin-bottom: 14px !important; line-height: 1.75 !important; color: #333 !important; font-size: 15px !important; }
      .article-viewer a { color: #ff385c !important; text-decoration: none !important; }
      .article-viewer a:hover { text-decoration: underline !important; }
      .article-viewer ul, .article-viewer ol { padding-left: 20px !important; margin-bottom: 14px !important; }
      .article-viewer li { margin-bottom: 6px !important; line-height: 1.7 !important; color: #333 !important; }
      .article-viewer strong { color: #1a1a1a !important; }
      /* Card spacing */
      .article-viewer > div[style*="background"] { margin-bottom: 12px !important; }
      .article-viewer > div[style*="border-top"] { margin-top: 28px !important; margin-bottom: 28px !important; }
    `;
    container.prepend(style);

    const wrapper = document.createElement('div');
    wrapper.className = 'article-scroll-container';
    wrapper.appendChild(container);

    // Add share button
    const shareBtn = document.createElement('button');
    shareBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> 复制链接';
    shareBtn.className = 'share-link-btn';
    shareBtn.onclick = function(e) {
      e.stopPropagation();
      const url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() { showToast('链接已复制'); }).catch(function() { showToast('请手动复制地址栏'); });
      } else { showToast('请手动复制地址栏'); }
    };

    const scrollWrapper = document.createElement('div');
    scrollWrapper.className = 'article-scroll-container';
    scrollWrapper.appendChild(shareBtn);
    scrollWrapper.appendChild(container);

    preview.innerHTML = '';
    preview.appendChild(scrollWrapper);
  } catch (e) {
    preview.innerHTML = '<div class="preview-empty"><h3>加载失败</h3><p>' + escapeHtml(e.message) + '</p></div>';
  }

  document.getElementById('app').classList.add('show-article');
}

function goBack() {
  currentArticle = null;
  document.getElementById('app').classList.remove('show-article');
  // Clear hash without full page reload
  window.history.pushState(null, '', window.location.pathname);
  renderArticleList();
  setTimeout(function() {
    const preview = document.getElementById('preview');
    preview.innerHTML = '<div class="preview-empty" id="previewEmpty">' +
      '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">' +
      '<rect x="8" y="4" width="48" height="56" rx="4"/>' +
      '<line x1="16" y1="16" x2="48" y2="16"/><line x1="16" y1="24" x2="40" y2="24"/>' +
      '<line x1="16" y1="32" x2="44" y2="32"/><line x1="16" y1="40" x2="36" y2="40"/>' +
      '</svg><h3>选择一篇文章</h3><p>点击左侧列表查看文章详情</p></div>';
  }, 350);
}

function handleBrandClick(e) {
  // Mobile: never navigate away — back to list or do nothing
  if (window.innerWidth <= 900) {
    e.preventDefault();
    const app = document.getElementById('app');
    if (app.classList.contains('show-article')) {
      goBack();
    }
    return;
  }
  // Desktop: default link behavior → go to graph.html
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg) {
  var existing = document.querySelector('.share-toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'share-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  requestAnimationFrame(function() { toast.classList.add('show'); });
  setTimeout(function() {
    toast.classList.remove('show');
    setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300);
  }, 2000);
}

// Check hash on page load for direct linking
function initFromHash() {
  var hash = window.location.hash;
  if (hash && hash.length > 1) {
    var articleId = hash.slice(1);
    for (var i = 0; i < ARTICLES.length; i++) {
      if (ARTICLES[i].id === articleId) {
        openArticle(i, true);
        return;
      }
    }
  }
}

// Handle browser back/forward navigation
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.articleIdx !== undefined) {
    openArticle(e.state.articleIdx, true);
  } else if (currentArticle !== null) {
    goBack();
  }
});

// Init
renderArticleList();
initFromHash();
</script>
</body>
</html>
