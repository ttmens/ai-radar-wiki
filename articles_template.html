<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08090a">
<title>AI Radar · 每日深度</title>
<link rel="icon" href="./assets/nexsight-mark.svg" type="image/svg+xml">
<link rel="stylesheet" href="./assets/site-chrome.css">
<style>
  :root {
    --bg: #08090a;
    --surface: #0f1011;
    --surface-soft: #161718;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --ink: #e8e8e8;
    --ink-soft: #a0a0a0;
    --ink-muted: #6a6a6a;
    --accent: #ff385c;
    --accent-active: #e00b41;
    --accent-soft: rgba(255,56,92,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== Header (same style as graph.html) ===== */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(15,16,17,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }

  .header-brand svg { width: 28px; height: 28px; }

  .header-brand h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .header-brand h1 span {
    color: var(--ink-muted);
    font-weight: 400;
    margin-left: 6px;
    font-size: 12px;
  }

  .header-right {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100vh;
    padding-top: 56px;
  }

  /* ===== Sidebar (Article List) ===== */
  .sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .sidebar-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 6px 4px 10px;
  }

  /* ===== Article Card ===== */
  .article-card {
    padding: 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(255,56,92,0.15);
  }

  .article-card:active {
    background: var(--accent-soft);
    transform: scale(0.98);
  }

  .article-card.active {
    background: var(--accent-soft);
    border-color: rgba(255,56,92,0.25);
  }

  .article-date {
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .article-date .badge {
    background: var(--accent);
    color: #fff;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }

  .article-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-overview {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ===== Preview Pane ===== */
  .preview {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink-muted);
    text-align: center;
    padding: 40px;
  }

  .preview-empty svg {
    width: 56px;
    height: 56px;
    margin-bottom: 14px;
    opacity: 0.25;
  }

  .preview-empty h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }

  .preview-empty p {
    font-size: 12px;
    max-width: 260px;
  }

  /* ===== Loading ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
  }
  .empty-state p { font-size: 13px; }

  /* ===== Mobile Tab Bar (reuse site-chrome.css pattern) ===== */
  .article-tab-bar {
    display: none;
  }

  /* ===== Mobile Responsive ===== */
  @media (max-width: 900px) {
    .app { flex-direction: column; }

    .sidebar {
      width: 100%;
      min-width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .preview {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    /* When viewing article: slide in */
    .app.show-article .preview {
      transform: translateX(0);
    }

    /* Hide site header stats on mobile */
    .header-right { display: none; }
    .header-brand h1 span { display: none; }

    /* Bottom tab bar for mobile */
    .article-tab-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(52px + max(12px, env(safe-area-inset-bottom)));
      padding: 0 max(16px, env(safe-area-inset-left)) max(8px, env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px) saturate(1.1);
      -webkit-backdrop-filter: blur(16px) saturate(1.1);
      border-top: 1px solid var(--border);
      box-shadow: 0 -1px 8px rgba(0,0,0,0.06);
      z-index: 101;
      align-items: stretch;
      justify-content: stretch;
    }

    .article-tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px;
      min-height: 52px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      color: var(--ink-muted);
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: color 0.15s;
    }

    .article-tab-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .article-tab-btn.active {
      color: var(--accent);
    }

    .article-tab-btn:active {
      opacity: 0.7;
    }

    /* Back button in tab bar when viewing article */
    .article-tab-bar .back-tab { display: none; }
    .app.show-article .article-tab-bar .back-tab { display: flex; }
    .app.show-article .article-tab-bar .list-tab { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="./graph.html" class="header-brand">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#ff385c" stroke-width="2"/>
      <circle cx="14" cy="14" r="5" fill="#ff385c"/>
    </svg>
    <h1>AI Radar<span>每日深度</span></h1>
  </a>
  <div class="header-right" id="headerStats"></div>
</header>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">文章归档</div>
    <div id="articleList"></div>
  </div>
  <div class="preview" id="preview">
    <div class="preview-empty" id="previewEmpty">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="8" y="4" width="48" height="56" rx="4"/>
        <line x1="16" y1="16" x2="48" y2="16"/>
        <line x1="16" y1="24" x2="40" y2="24"/>
        <line x1="16" y1="32" x2="44" y2="32"/>
        <line x1="16" y1="40" x2="36" y2="40"/>
      </svg>
      <h3>选择一篇文章</h3>
      <p>点击列表查看文章详情</p>
    </div>
  </div>
</div>

<!-- Mobile Tab Bar -->
<nav class="article-tab-bar">
  <button class="article-tab-btn list-tab" onclick="goBackTo()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>归档</span>
  </button>
  <button class="article-tab-btn back-tab" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    <span>返回</span>
  </button>
  <a href="./graph.html" class="article-tab-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
    <span>探索</span>
  </a>
  <a href="./index.html" class="article-tab-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
    <span>简报</span>
  </a>
</nav>

<script>
// {{ARTICLES_DATA}}

let currentArticle = null;

function renderArticleList() {
  const list = document.getElementById('articleList');
  const stats = document.getElementById('headerStats');

  if (!ARTICLES || ARTICLES.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>暂无文章，明天 19:00 后将自动生成</p></div>';
    if (stats) stats.textContent = '';
    return;
  }

  if (stats) stats.textContent = ARTICLES.length + ' 篇文章';

  let html = '';
  ARTICLES.forEach(function(article, idx) {
    const isActive = currentArticle === idx ? ' active' : '';
    html += '<div class="article-card' + isActive + '" onclick="openArticle(' + idx + ')">';
    html += '<div class="article-date">';
    if (article.isLatest) html += '<span class="badge">最新</span>';
    html += article.date + '</div>';
    html += '<div class="article-title">' + escapeHtml(article.title) + '</div>';
    html += '<div class="article-overview">' + escapeHtml(article.overview || '') + '</div>';
    html += '</div>';
  });

  list.innerHTML = html;
}

function openArticle(idx) {
  const article = ARTICLES[idx];
  if (!article) return;

  currentArticle = idx;
  renderArticleList();

  const preview = document.getElementById('preview');
  const empty = document.getElementById('previewEmpty');
  if (empty) empty.remove();

  // Show loading
  preview.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

  // Decode and render article
  try {
    const binary = atob(article.content);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const html = new TextDecoder('utf-8').decode(bytes);

    const container = document.createElement('div');
    container.className = 'article-viewer';
    container.innerHTML = html;
    container.style.cssText = 'width:100%;max-width:720px;margin:0 auto;padding:32px 24px;background:#fff;color:#333;font-size:16px;line-height:1.8;';

    // Style overrides for article content
    const style = document.createElement('style');
    style.textContent = `
      .article-viewer { min-height: 100%; }
      .article-viewer h1 { font-size: 22px !important; font-weight: 700 !important; color: #000 !important; margin-bottom: 8px !important; }
      .article-viewer h2 { font-size: 18px !important; font-weight: 600 !important; color: #000 !important; margin-top: 28px !important; margin-bottom: 8px !important; }
      .article-viewer h3 { font-size: 16px !important; font-weight: 600 !important; color: #000 !important; margin-top: 20px !important; margin-bottom: 6px !important; }
      .article-viewer p { margin-bottom: 14px !important; }
      .article-viewer a { color: #ff385c !important; }
      .article-viewer ul, .article-viewer ol { padding-left: 18px !important; margin-bottom: 14px !important; }
      .article-viewer li { margin-bottom: 6px !important; }
      .article-viewer strong { color: #000 !important; }
    `;
    container.prepend(style);

    const wrapper = document.createElement('div');
    wrapper.className = 'article-scroll-container';
    wrapper.style.cssText = 'width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;';
    wrapper.appendChild(container);

    preview.innerHTML = '';
    preview.appendChild(wrapper);
  } catch (e) {
    preview.innerHTML = '<div class="preview-empty"><h3>加载失败</h3><p>' + escapeHtml(e.message) + '</p></div>';
  }

  // Mobile: slide in article
  document.getElementById('app').classList.add('show-article');
}

function goBack() {
  currentArticle = null;
  document.getElementById('app').classList.remove('show-article');
  renderArticleList();
  // Restore empty state
  const preview = document.getElementById('preview');
  preview.innerHTML = '<div class="preview-empty" id="previewEmpty">' +
    '<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">' +
    '<rect x="8" y="4" width="48" height="56" rx="4"/>' +
    '<line x1="16" y1="16" x2="48" y2="16"/><line x1="16" y1="24" x2="40" y2="24"/>' +
    '<line x1="16" y1="32" x2="44" y2="32"/><line x1="16" y1="40" x2="36" y2="40"/>' +
    '</svg><h3>选择一篇文章</h3><p>点击列表查看文章详情</p></div>';
}

function goBackTo() {
  // Same as goBack but called from tab bar
  goBack();
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Init
renderArticleList();
</script>
</body>
</html>
