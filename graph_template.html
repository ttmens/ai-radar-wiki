<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar Knowledge Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --panel-bg: #0f1011;
    --surface: #191a1b;
    --border: rgba(255,255,255,0.08);
    --border-solid: #23252a;
    --text-primary: #f7f8f8;
    --text-secondary: #d0d6e0;
    --text-tertiary: #8a8f98;
    --text-quaternary: #62666d;
    --accent: #7170ff;
    --accent-bg: #5e6ad2;
    --accent-hover: #828fff;
    --green: #27a644;
    --emerald: #10b981;
    --pillars: { "capabilities": "#58a6ff", "patterns": "#3fb950", "ecosystem": "#a371f7", "business": "#f0883e" };
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text-primary);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-feature-settings: "cv01", "ss03";
    overflow: hidden;
    font-size: 14px;
  }

  /* ===== HEADER ===== */
  #header {
    position: absolute; top: 0; left: 0; right: 0; height: 52px;
    padding: 0 20px;
    background: rgba(8,9,10,0.9); backdrop-filter: blur(12px);
    z-index: 100; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  #header h1 {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
    letter-spacing: -0.2px;
  }
  #header h1 .logo { font-size: 18px; }
  #header-controls { display: flex; align-items: center; gap: 8px; }
  #stats span {
    background: rgba(255,255,255,0.04); padding: 4px 10px; border-radius: 4px;
    font-size: 12px; font-family: 'Inter', monospace; color: var(--text-tertiary);
    border: 1px solid var(--border);
  }
  .header-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-solid);
    color: var(--text-secondary); padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s;
    font-family: inherit; display: flex; align-items: center; gap: 6px;
  }
  .header-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
  .header-btn.primary { background: var(--accent-bg); border-color: var(--accent-bg); color: #fff; }
  .header-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  /* ===== NETWORK AREA ===== */
  #mynetwork { width: 100%; height: 100vh; cursor: grab; }
  #mynetwork:active { cursor: grabbing; }

  /* ===== DASHBOARD - LEFT PANEL ===== */
  #dashboard {
    position: absolute; top: 64px; left: 12px; bottom: 12px; width: 340px;
    background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px;
    z-index: 50; display: flex; flex-direction: column;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, opacity 0.3s ease;
    overflow: hidden;
  }
  #dashboard.hidden { transform: translateX(calc(-100% - 20px)); opacity: 0; pointer-events: none; }

  .dash-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .dash-header-title { font-size: 13px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.1px; }
  .dash-close-btn {
    background: none; border: none; color: var(--text-quaternary); cursor: pointer;
    font-size: 16px; padding: 4px 6px; border-radius: 4px; transition: all 0.15s;
  }
  .dash-close-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }

  .dash-content { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .dash-content::-webkit-scrollbar { width: 4px; }
  .dash-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Dashboard expand button (vertical tab on left edge) */
  #dashboard-expand-btn {
    position: absolute; top: 50%; left: 0; z-index: 55;
    transform: translateY(-50%);
    background: var(--panel-bg); border: 1px solid var(--border);
    border-left: none; border-radius: 0 6px 6px 0;
    padding: 12px 8px; cursor: pointer;
    display: none; /* hidden when dashboard is visible */
    transition: all 0.3s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.3);
    writing-mode: vertical-lr;
    font-size: 12px; font-weight: 600; color: var(--text-tertiary);
    letter-spacing: 2px;
  }
  #dashboard-expand-btn:hover { color: var(--text-primary); background: var(--surface); }
  #dashboard-expand-btn.show { display: flex; }

  /* Summary headline */
  .summary-headline {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 12px; line-height: 1.4; padding: 10px 12px;
    background: linear-gradient(135deg, rgba(94,106,210,0.12), rgba(113,112,255,0.08));
    border-radius: 6px; border-left: 2px solid var(--accent-bg);
    letter-spacing: -0.1px;
  }

  /* Watch list */
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-quaternary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 14px;
  }
  .summary-watch { background: var(--surface); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid var(--border); }
  .watch-item { font-size: 12px; margin-bottom: 8px; }
  .watch-item:last-child { margin-bottom: 0; }
  .watch-item-title { color: var(--text-primary); font-weight: 500; margin-bottom: 2px; cursor: pointer; }
  .watch-item-title:hover { color: var(--accent); }
  .watch-item-reason { color: var(--text-tertiary); font-size: 11px; line-height: 1.4; }

  /* Stats */
  .summary-stats {
    font-size: 11px; color: var(--text-tertiary); padding: 8px 10px;
    background: var(--surface); border-radius: 6px; border: 1px solid var(--border);
    line-height: 1.5; margin-bottom: 12px;
  }

  /* Insight sections (collapsible by pillar) */
  .insight-section { margin-bottom: 6px; }
  .insight-header {
    padding: 8px 10px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; font-size: 12px; font-weight: 600; color: var(--text-secondary);
    border-radius: 6px; transition: background 0.15s; user-select: none;
  }
  .insight-header:hover { background: rgba(255,255,255,0.04); }
  .insight-arrow { font-size: 10px; color: var(--text-quaternary); transition: transform 0.2s; }
  .insight-header.expanded .insight-arrow { transform: rotate(90deg); }
  .insight-body { display: none; padding: 4px 10px 8px; }
  .insight-body.show { display: block; }
  .insight-summary { font-size: 11px; color: var(--text-tertiary); line-height: 1.5; margin-bottom: 6px; }
  .insight-evidence { list-style: none; padding: 0; }
  .insight-evidence li {
    font-size: 11px; color: var(--accent); padding: 3px 0 3px 14px; position: relative;
    cursor: pointer; border-radius: 3px; transition: background 0.15s; line-height: 1.4;
  }
  .insight-evidence li:hover { background: rgba(113,112,255,0.08); }
  .insight-evidence li::before { content: "↗"; position: absolute; left: 0; color: var(--text-quaternary); font-size: 10px; }

  /* ===== LEGEND ===== */
  #legend {
    position: absolute; bottom: 12px; left: 372px; z-index: 40;
    background: rgba(15,16,17,0.92); padding: 10px 12px; border-radius: 6px;
    font-size: 11px; border: 1px solid var(--border); backdrop-filter: blur(8px);
    transition: left 0.3s ease;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
  }
  #legend.shifted { left: 12px; }
  .legend-title { font-weight: 600; margin-bottom: 6px; color: var(--text-tertiary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: var(--text-tertiary); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ===== DETAIL PANEL - RIGHT ===== */
  #detail-panel {
    position: absolute; top: 64px; right: -460px; width: 460px; height: calc(100vh - 76px);
    background: var(--panel-bg); border-left: 1px solid var(--border);
    z-index: 80; transition: right 0.3s ease; overflow-y: auto;
    display: flex; flex-direction: column;
    box-shadow: -5px 0 30px rgba(0,0,0,0.5);
  }
  #detail-panel.active { right: 0; }

  .panel-header { padding: 20px; border-bottom: 1px solid var(--border); position: relative; }
  .panel-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-solid);
    color: var(--text-tertiary); width: 28px; height: 28px; border-radius: 6px;
    cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .panel-close:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
  .panel-title { font-size: 15px; color: var(--text-primary); line-height: 1.4; margin-right: 36px; font-weight: 600; letter-spacing: -0.1px; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 4px;
    font-size: 11px; color: var(--text-secondary); border: 1px solid var(--border);
  }
  .tag.pillar { border-color: rgba(39,166,68,0.3); color: var(--green); background: rgba(39,166,68,0.1); }
  .tag.score { border-color: rgba(113,112,255,0.3); color: var(--accent); background: rgba(113,112,255,0.08); }

  .panel-body { padding: 20px; flex: 1; }
  .panel-section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px; color: var(--text-quaternary); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;
  }

  /* Chinese summary */
  .panel-summary {
    font-size: 13px; line-height: 1.7; color: var(--text-primary);
    white-space: pre-wrap; word-break: break-word;
  }

  /* Source info */
  .source-meta { display: flex; gap: 16px; margin-bottom: 12px; }
  .source-meta-item { font-size: 12px; color: var(--text-tertiary); }
  .source-meta-item span { color: var(--text-secondary); }

  /* Original text preview */
  .panel-source-preview {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; font-size: 12px; line-height: 1.6; color: var(--text-secondary);
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .panel-source-preview::-webkit-scrollbar { width: 4px; }
  .panel-source-preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Actions */
  .panel-actions {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--panel-bg); display: flex; gap: 8px;
    flex-shrink: 0;
  }
  .action-btn {
    flex: 1; padding: 10px 16px; border-radius: 6px; font-weight: 500;
    font-size: 13px; transition: all 0.15s; border: none; cursor: pointer;
    text-align: center; text-decoration: none; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .action-btn.primary { background: var(--accent-bg); color: #fff; }
  .action-btn.primary:hover { background: var(--accent-hover); }
  .action-btn.secondary { background: rgba(255,255,255,0.04); border: 1px solid var(--border-solid); color: var(--text-secondary); }
  .action-btn.secondary:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

  /* Related items section */
  #related-section { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; }
  .related-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px; margin-bottom: 6px; border-radius: 6px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .related-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
  .related-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
  }
  .related-info { flex: 1; min-width: 0; }
  .related-title {
    font-size: 12px; color: var(--text-primary); line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .related-meta { font-size: 10px; color: var(--text-quaternary); margin-top: 2px; }

  /* ===== Viewpoint-driven summary styles ===== */
  .value-overview {
    background: rgba(113, 112, 255, 0.06);
    border: 1px solid rgba(113, 112, 255, 0.15);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  /* Signal cards */
  .signal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    transition: all 0.15s;
  }
  .signal-card:hover { border-color: rgba(255,255,255,0.15); }
  
  .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .signal-value { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .signal-value.high { background: rgba(248, 81, 73, 0.12); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.25); }
  .signal-value.medium { background: rgba(210, 153, 34, 0.12); color: #d29922; border: 1px solid rgba(210, 153, 34, 0.25); }
  .signal-value.low { background: rgba(139, 148, 158, 0.12); color: #8b949e; border: 1px solid rgba(139, 148, 158, 0.25); }
  .signal-context { font-size: 10px; color: var(--text-quaternary); }
  
  .signal-title {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    cursor: pointer; margin-bottom: 6px; line-height: 1.4;
  }
  .signal-title:hover { color: var(--accent); }
  .signal-judgment { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.5; }
  .signal-insight { font-size: 12px; color: var(--text-primary); line-height: 1.6; margin-bottom: 6px; }
  .signal-action {
    font-size: 11px; color: var(--green); background: rgba(39, 166, 68, 0.08);
    padding: 6px 10px; border-radius: 4px; border-left: 2px solid var(--green);
  }

  /* Trend cards */
  .trend-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .trend-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .trend-direction { font-size: 11px; color: var(--text-secondary); }
  .trend-summary { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
  .trend-evidence { display: flex; flex-direction: column; gap: 4px; }
  .trend-evidence-item {
    font-size: 11px; color: var(--text-tertiary); padding: 4px 8px;
    border-radius: 4px; background: rgba(255,255,255,0.02); cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .trend-evidence-item:hover {
    color: var(--text-primary); background: rgba(255,255,255,0.05);
    border-color: var(--border);
  }


  /* ===== Simple daily brief styles ===== */
  .dash-headline {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    margin-bottom: 8px; letter-spacing: -0.2px;
  }
  .dash-overview {
    font-size: 12px; line-height: 1.6; color: var(--text-secondary);
    padding: 8px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .dash-stats {
    font-size: 11px; color: var(--text-quaternary);
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  /* Stories list */
  .dash-stories { display: flex; flex-direction: column; }

  /* Brief headline with close button (sticky) */
  .brief-headline {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    padding: 0 2px 12px; border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
    position: sticky; top: 0; z-index: 10;
    background: var(--panel-bg);
    display: flex; justify-content: space-between; align-items: center;
  }
  .dash-story {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: opacity 0.15s;
  }
  .dash-story:last-child { border-bottom: none; }
  .dash-story:hover { opacity: 0.8; }

  .dash-story-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .dash-story-num {
    width: 20px; height: 20px; border-radius: 4px;
    background: rgba(113, 112, 255, 0.12); color: var(--accent);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .dash-story-title {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    flex: 1; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dash-story-score {
    font-size: 10px; font-weight: 600; color: var(--text-quaternary);
    background: rgba(255,255,255,0.04); padding: 2px 6px; border-radius: 3px;
    flex-shrink: 0;
  }
  .dash-story-pillar {
    font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px;
  }
  .dash-story-summary {
    font-size: 12px; line-height: 1.65; color: var(--text-secondary);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden;
  }


  /* ===== Daily brief - insight + evidence format ===== */
  .brief-overview {
    font-size: 12px; color: var(--text-secondary);
    padding: 6px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 10px; line-height: 1.5;
  }
  .brief-stats {
    font-size: 11px; color: var(--text-quaternary);
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  /* Insight blocks */
  .insight-block {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .insight-block:last-child { border-bottom: none; }

  .insight-header-pillar {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 4px;
  }
  .insight-text {
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.6; margin-bottom: 8px;
  }

  /* Evidence list */
  .evidence-list { display: flex; flex-direction: column; gap: 4px; }
  .evidence-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .evidence-item:hover { background: rgba(255,255,255,0.04); }
  
  .evidence-num {
    width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
    background: rgba(113, 112, 255, 0.1); color: var(--accent);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .evidence-content { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
  .evidence-title {
    font-size: 12px; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .evidence-score {
    font-size: 10px; color: var(--text-quaternary); flex-shrink: 0;
    background: rgba(255,255,255,0.04); padding: 1px 5px; border-radius: 3px;
  }

  /* ===== Narrative cards (cross-cutting trends) ===== */
  .narrative-section {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .narrative-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .narrative-card {
    background: linear-gradient(135deg, rgba(94,106,210,0.08), rgba(113,112,255,0.04));
    border: 1px solid rgba(113,112,255,0.15);
    border-left: 3px solid var(--accent-bg);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: background 0.15s;
  }
  .narrative-card:hover {
    background: linear-gradient(135deg, rgba(94,106,210,0.12), rgba(113,112,255,0.08));
  }
  .narrative-card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 8px;
  }
  .narrative-card-header .narrative-type {
    margin-bottom: 0; margin-right: 8px; flex-shrink: 0;
  }
  .narrative-card-header .narrative-title {
    flex: 1; margin-bottom: 0;
  }
  .narrative-toggle {
    font-size: 10px; color: var(--text-quaternary);
    transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; margin-top: 2px;
  }
  .narrative-card.collapsed .narrative-toggle { transform: rotate(-90deg); }
  .narrative-card.collapsed .narrative-body-wrapper { display: none; }
  .narrative-card.collapsed { cursor: pointer; }
  .narrative-type {
    font-size: 10px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .narrative-title {
    font-size: 13px; font-weight: 700; color: var(--text-primary);
    line-height: 1.4; letter-spacing: -0.1px;
  }
  .narrative-body-wrapper {
    margin-top: 8px;
  }
  .narrative-body {
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.7;
  }
  .narrative-action {
    font-size: 11px; color: var(--green);
    background: rgba(39, 166, 68, 0.06);
    padding: 8px 10px; border-radius: 4px;
    border-left: 2px solid var(--green);
    margin-top: 10px; line-height: 1.6;
  }

  /* ===== Insight divider ===== */
  .insight-divider {
    font-size: 11px; font-weight: 600; color: var(--text-quaternary);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 10px 0 6px; border-bottom: 1px solid var(--border);
    margin-bottom: 8px; margin-top: 12px;
  }
  .insight-divider:first-of-type {
    margin-top: 0;
  }

  /* ===== GitHub buttons ===== */
  .github-btn-group {
    display: flex; align-items: center; gap: 6px;
  }
  .github-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-solid);
    color: var(--text-secondary); padding: 5px 10px; border-radius: 6px;
    cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s; text-decoration: none; font-family: inherit;
  }
  .github-btn:hover {
    background: rgba(255,255,255,0.08); color: var(--text-primary);
    border-color: rgba(255,255,255,0.15);
  }
  .github-btn svg {
    width: 14px; height: 14px; fill: currentColor;
  }
  .github-btn .count {
    font-family: 'Inter', monospace; font-size: 11px;
    color: var(--text-tertiary);
  }

</style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1><span class="logo">🧠</span> AI Radar Knowledge Graph</h1>
    <div id="header-controls">
      <a href="./feed.xml" class="header-btn primary" target="_blank">📡 RSS</a>
      <div id="stats">
        <span id="node-count">0</span> <span id="edge-count">0</span>
      </div>
      <div class="github-btn-group" style="margin-left: 12px;">
        <a href="https://github.com/ttmens/ai-radar-wiki" class="github-btn" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
          <span class="count">Star</span>
        </a>
        <a href="https://github.com/ttmens/ai-radar-wiki/fork" class="github-btn" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"></path></svg>
          <span class="count">Fork</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Dashboard (Left) -->
  <div id="dashboard">
    <div class="dash-content" id="dash-content">Loading...</div>
  </div>
  <button id="dashboard-expand-btn" onclick="toggleDashboard()">📅 情报摘要</button>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-title">知识分类</div>
    <div class="legend-item"><span class="dot" style="background:#58a6ff"></span> 技术能力</div>
    <div class="legend-item"><span class="dot" style="background:#3fb950"></span> 产品模式</div>
    <div class="legend-item"><span class="dot" style="background:#a371f7"></span> 工具生态</div>
    <div class="legend-item"><span class="dot" style="background:#f0883e"></span> 商业趋势</div>
  </div>

  <!-- Graph Canvas -->
  <div id="mynetwork"></div>

  <!-- Detail Panel (Right) -->
  <div id="detail-panel">
    <div class="panel-header">
      <button class="panel-close" onclick="hidePanel()">✕</button>
      <div class="panel-title" id="panel-title">节点详情</div>
      <div class="panel-tags" id="panel-tags"></div>
    </div>
    <div class="panel-body">
      <div class="panel-section">
        <div class="section-title">📝 摘要总结</div>
        <div class="panel-summary" id="panel-summary">点击图谱节点查看摘要</div>
      </div>
      <div class="panel-section">
        <div class="section-title">📄 原文</div>
        <div class="source-meta" id="source-meta"></div>
        <div class="panel-source-preview" id="panel-source-preview">加载中...</div>
      </div>
      <div class="panel-section" id="related-section" style="display:none">
        <div class="section-title">🔗 相关情报</div>
        <div id="related-items"></div>
      </div>
    </div>
    <div class="panel-actions">
      <a href="#" id="panel-link" class="action-btn primary" target="_blank">🔗 查看原文</a>
      <button class="action-btn secondary" onclick="toggleRawSource()">📋 完整原文</button>
    </div>
  </div>

  <!-- Data & Libs -->
  <script id="graph-data" type="application/json">{{DATA}}</script>
  <script src="./assets/vis-network.min.js"></script>
  <script>
    const data = JSON.parse(document.getElementById('graph-data').textContent);
    const pillarColors = { capabilities: '#58a6ff', patterns: '#3fb950', ecosystem: '#a371f7', business: '#f0883e', unknown: '#8b949e' };
    const pillarNames = { capabilities: '🤖 技术能力', patterns: '📱 产品模式', ecosystem: '🔧 工具生态', business: '💰 商业趋势', unknown: '未分类' };
    const pillarKeys = ['capabilities', 'patterns', 'ecosystem', 'business'];
    let network;
    let dailySummary = null;
    let currentNode = null;
    let showingRaw = false;

    // ===== 1. STRUCTURED DAILY SUMMARY =====
    async function renderStructuredSummary() {
      const container = document.getElementById('dash-content');
      try {
        const resp = await fetch('./daily_summary.json?t=' + Date.now());
        if (!resp.ok) throw new Error('Not found');
        const summaryData = await resp.json();
        dailySummary = summaryData.daily_summary;
      } catch (e) {
        dailySummary = generateFallbackSummary();
      }

      if (!dailySummary) {
        container.innerHTML = '<div class="brief-headline">今日暂无新情报<button class="dash-close-btn" onclick="toggleDashboard()" title="收起">✕</button></div><div style="color:var(--text-quaternary); font-size:12px; text-align:center; padding:40px 20px;">暂无数据</div>';
        return;
      }

      let html = '';

      // Headline with sticky close button
      html += '<div class="brief-headline">' + (dailySummary.headline || '') + '<button class="dash-close-btn" onclick="toggleDashboard()" title="收起">✕</button></div>';

      // Overview (主叙事 / 一句话概括)
      if (dailySummary.overview) {
        html += '<div class="brief-overview">' + dailySummary.overview + '</div>';
      }

      // Stats
      if (dailySummary.stats) {
        html += '<div class="brief-stats">' + dailySummary.stats + '</div>';
      }

      // ===== Narratives: 跨节点叙事主线 =====
      if (dailySummary.narratives && dailySummary.narratives.length > 0) {
        html += '<div class="narrative-section">';
        dailySummary.narratives.forEach(function(narrative, idx) {
          var typeLabels = {
            'paradigm_shift': '🔄 范式转移',
            'bottleneck': '⚠️ 核心瓶颈',
            'maturation': '📈 行业成熟',
            'validation': '💡 模式验证'
          };
          var typeLabel = typeLabels[narrative.type] || '📌 趋势';
          var actionHtml = '';
          if (narrative.action) {
            actionHtml = '<div class="narrative-action">' + narrative.action + '</div>';
          }
          html += '<div class="narrative-card" onclick="toggleNarrative(this)" style="cursor:pointer">';
          html += '<div class="narrative-card-header">';
          html += '<div class="narrative-type">' + typeLabel + '</div>';
          html += '<div class="narrative-title">' + (narrative.title || '') + '</div>';
          html += '<span class="narrative-toggle">▼</span>';
          html += '</div>';
          html += '<div class="narrative-body-wrapper">';
          html += '<div class="narrative-body">' + (narrative.body || '') + '</div>';
          html += actionHtml;
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      // ===== Insights: 按pillar分组，观点 + 证据 =====
      if (dailySummary.insights && dailySummary.insights.length > 0) {
        html += '<div class="insight-divider">📊 分领域证据</div>';
        dailySummary.insights.forEach(function(insight) {
          html += '<div class="insight-block">';
          html += '<div class="insight-header-pillar">' + (insight.pillar || '') + '</div>';
          html += '<div class="insight-text">' + (insight.insight || '') + '</div>';

          if (insight.evidence && insight.evidence.length > 0) {
            html += '<div class="evidence-list">';
            insight.evidence.forEach(function(ev, i) {
              html += '<div class="evidence-item" onclick="focusNode(\'' + (ev.id || '') + '\')">';
              html += '<span class="evidence-num">' + (i + 1) + '</span>';
              html += '<div class="evidence-content">';
              html += '<div class="evidence-title">' + (ev.title || '') + '</div>';
              html += '<span class="evidence-score">PM ' + (ev.score || 0).toFixed(2) + '</span>';
              html += '</div>';
              html += '</div>';
            });
            html += '</div>';
          }

          html += '</div>';
        });
      }

      container.innerHTML = html;
    }

    function generateFallbackSummary() {
      const today = new Date().toISOString().slice(0, 10);
      const todayNodes = data.nodes.filter(n => n.date && n.date.startsWith(today) && n.type !== 'concept');
      if (todayNodes.length === 0) return null;
      return {
        headline: '今日 ' + todayNodes.length + ' 条 AI 情报速递',
        insights: [{ title: '📊 技术动态', summary: '今日 AI 领域有多项进展。', evidence: todayNodes.slice(0, 3).map(n => n.label) }],
        watch_list: [],
        stats: '今日共 ' + todayNodes.length + ' 条情报'
      };
    }

    function toggleInsight(header) {
      header.classList.toggle('expanded');
      const body = header.nextElementSibling;
      body.classList.toggle('show');
    }

    function searchArticle(title) {
      // Try multiple matching strategies
      let match = null;
      
      // 1. Exact match on id (for direct node IDs)
      const byId = data.nodes.find(n => n.id === title);
      if (byId) { match = byId; }
      
      // 2. Exact match on label
      if (!match) {
        const byLabel = data.nodes.find(n => n.label === title);
        if (byLabel) match = byLabel;
      }
      
      // 3. Partial match: label includes title
      if (!match) {
        const byIncludes = data.nodes.find(n => n.label.toLowerCase().includes(title.toLowerCase()));
        if (byIncludes) match = byIncludes;
      }
      
      // 4. Partial match: title includes label
      if (!match) {
        const byReverse = data.nodes.find(n => title.toLowerCase().includes(n.label.toLowerCase()));
        if (byReverse) match = byReverse;
      }
      
      // 5. Match on summary content
      if (!match) {
        const bySummary = data.nodes.find(n => n.summary && n.summary.includes(title));
        if (bySummary) match = bySummary;
      }
      
      if (match) {
        focusNode(match.id);
      }
    }

    // ===== 2. NETWORK RENDER =====
    function renderNetwork() {
      const nodes = new vis.DataSet(data.nodes.map(n => ({
        id: n.id,
        label: n.label.length > 20 ? n.label.slice(0, 20) + '...' : n.label,
        shape: 'dot',
        size: Math.max(10, Math.min(28, (n.pm_score || 0.1) * 30 + 10)),
        color: {
          background: pillarColors[n.pillar] || '#8b949e',
          border: 'rgba(255,255,255,0.3)',
          highlight: { background: pillarColors[n.pillar] || '#fff', border: '#fff' }
        },
        font: { color: '#f7f8f8', size: 11, strokeWidth: 2, strokeColor: '#08090a' },
        borderWidth: 2
      })));

      const edges = new vis.DataSet(data.edges.map(e => ({
        from: e.source, to: e.target,
        color: { color: e.type === 'PILLAR' ? 'rgba(39,166,68,0.2)' : 'rgba(255,255,255,0.06)' },
        width: e.type === 'PILLAR' ? 1.5 : 0.5,
        smooth: { type: 'curvedCW', roundness: 0.1 }
      })));

      network = new vis.Network(document.getElementById('mynetwork'), { nodes, edges }, {
        physics: { barnesHut: { gravitationalConstant: -3000, springLength: 150, springConstant: 0.04 }, stabilization: { iterations: 200 } },
        interaction: { hover: true, zoomView: true, dragView: true, dragNodes: true }
      });

      network.on('click', function(params) {
        if (params.nodes.length > 0) showPanel(params.nodes[0]);
        else hidePanel();
      });

      document.getElementById('node-count').textContent = data.nodes.filter(n => n.type !== 'concept').length + ' nodes';
      document.getElementById('edge-count').textContent = data.edges.length + ' edges';
    }

    // ===== 3. DETAIL PANEL =====
    function showPanel(nodeId) {
      const node = data.nodes.find(n => n.id === nodeId);
      if (!node) return;
      currentNode = node;
      showingRaw = false;

      // Title
      document.getElementById('panel-title').textContent = node.label;

      // Tags
      const tagsHtml = [];
      if (node.pillar) tagsHtml.push('<span class="tag pillar">' + (pillarNames[node.pillar] || node.pillar) + '</span>');
      if (node.date) tagsHtml.push('<span class="tag">📅 ' + node.date + '</span>');
      if (node.pm_score) tagsHtml.push('<span class="tag score">🎯 PM ' + node.pm_score.toFixed(1) + '</span>');
      if (node.type && node.type !== 'concept') tagsHtml.push('<span class="tag">' + node.type + '</span>');
      document.getElementById('panel-tags').innerHTML = tagsHtml.join('');

      // Chinese summary (精炼版, 120 chars max)
      let summary = node.summary || '';
      let conciseSummary = '';
      if (!summary || summary.length === 0) {
        if (node.type === 'paper') conciseSummary = '📚 学术研究论文\n\n建议点击"查看原文"查看完整学术摘要和实验数据。';
        else if (node.type === 'hn' || node.type === 'showhn') conciseSummary = '💬 Hacker News 社区讨论\n\n点击"查看原文"查看社区观点和讨论内容。';
        else if (node.type === 'news' || node.type === 'techcrunch') conciseSummary = '📰 科技新闻报道\n\n点击"查看原文"查看完整新闻内容。';
        else conciseSummary = '暂无摘要信息，建议点击"查看原文"查看详情。';
      } else {
        // 精炼版摘要 (120 chars max)
        conciseSummary = summary.length > 120 ? summary.substring(0, 120) + '…' : summary;
      }
      document.getElementById('panel-summary').textContent = conciseSummary;

      // Source metadata
      const metaHtml = [];
      if (node.url) {
        try {
          const domain = new URL(node.url).hostname.replace('www.', '');
          metaHtml.push('<div class="source-meta-item">来源：<span>' + domain + '</span></div>');
        } catch(e) { metaHtml.push('<div class="source-meta-item">来源：<span>外部链接</span></div>'); }
      } else {
        metaHtml.push('<div class="source-meta-item">来源：<span>无原始链接</span></div>');
      }
      if (node.date) metaHtml.push('<div class="source-meta-item">日期：<span>' + node.date + '</span></div>');
      if (node.type) metaHtml.push('<div class="source-meta-item">类型：<span>' + node.type + '</span></div>');
      document.getElementById('source-meta').innerHTML = metaHtml.join('');

      // Original text preview (use raw_content, not summary)
      const preview = document.getElementById('panel-source-preview');
      const rawContent = currentNode.raw_content || '';
      if (rawContent && rawContent.length > 0) {
        // Show first 300 chars of raw_content as preview
        preview.textContent = rawContent.length > 300 ? rawContent.substring(0, 300) + '\n\n...' : rawContent;
      } else {
        // Fallback: show summary if no raw_content
        preview.textContent = summary || '暂无原文内容';
      }

      // Link button
      const linkBtn = document.getElementById('panel-link');
      if (node.url) {
        linkBtn.href = node.url;
        linkBtn.style.display = 'flex';
      } else {
        linkBtn.style.display = 'none';
      }

      // Reset toggle button
      document.querySelector('.action-btn.secondary').textContent = '📋 完整原文';

      // Related items (same pillar, excluding self)
      renderRelatedItems(node);

      document.getElementById('detail-panel').classList.add('active');
    }

    function renderRelatedItems(currentNode) {
      const section = document.getElementById('related-section');
      const container = document.getElementById('related-items');
      
      const pillar = currentNode.pillar || '';
      const currentId = currentNode.id;
      
      // Find nodes in same pillar, sorted by pm_score, excluding self
      const related = data.nodes
        .filter(n => n.pillar === pillar && n.id !== currentId && n.type !== 'concept')
        .sort((a, b) => (b.pm_score || 0) - (a.pm_score || 0))
        .slice(0, 5);
      
      if (related.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      const pillarColor = pillarColors[pillar] || '#8b949e';
      
      let html = '';
      related.forEach(r => {
        const score = (r.pm_score || 0).toFixed(2);
        html += '<div class="related-item" onclick="focusNode(\'' + r.id + '\')">' +
          '<div class="related-dot" style="background:' + pillarColor + '"></div>' +
          '<div class="related-info">' +
            '<div class="related-title">' + r.label + '</div>' +
            '<div class="related-meta">PM ' + score + ' · ' + (r.date || '') + '</div>' +
          '</div></div>';
      });
      
      container.innerHTML = html;
    }

    function hidePanel() { document.getElementById('detail-panel').classList.remove('active'); }

    function focusNode(id) {
      const node = data.nodes.find(n => n.id === id);
      if (!node) return;
      
      // Select the node
      network.selectNodes([id]);
      
      // Get node position from the network body
      const pos = network.getPositions([id])[id];
      if (pos) {
        network.moveTo({
          position: { x: pos.x, y: pos.y },
          scale: 1.2,
          animation: { duration: 500, easingFunction: 'easeInOutQuad' }
        });
      }
      
      showPanel(id);
    }

    // Toggle raw source
    function toggleRawSource() {
      const preview = document.getElementById('panel-source-preview');
      const btn = document.querySelector('.action-btn.secondary');
      if (!currentNode) return;
      
      const summary = currentNode.summary || '';
      const rawContent = currentNode.raw_content || '';
      
      if (showingRaw) {
        // Back to raw_content preview (first 300 chars)
        if (rawContent && rawContent.length > 0) {
          preview.textContent = rawContent.length > 300 ? rawContent.substring(0, 300) + '\n\n...' : rawContent;
        } else {
          preview.textContent = summary || '暂无原文内容';
        }
        btn.textContent = '📋 完整原文';
        showingRaw = false;
      } else {
        // Show full raw_content
        if (rawContent && rawContent.length > 0) {
          preview.textContent = rawContent;
        } else {
          preview.textContent = summary || '暂无原文内容';
        }
        btn.textContent = '📝 返回预览';
        showingRaw = true;
      }
    }

    // ===== 4b. TOGGLE NARRATIVE CARD =====
    function toggleNarrative(card) {
      card.classList.toggle('collapsed');
    }

    // ===== 5. TOGGLE DASHBOARD =====
    function toggleDashboard() {
      const dash = document.getElementById('dashboard');
      const legend = document.getElementById('legend');
      const expandBtn = document.getElementById('dashboard-expand-btn');
      const isHidden = dash.classList.contains('hidden');

      if (isHidden) {
        dash.classList.remove('hidden');
        legend.classList.remove('shifted');
        expandBtn.classList.remove('show');
      } else {
        dash.classList.add('hidden');
        legend.classList.add('shifted');
        expandBtn.classList.add('show');
      }
    }

    // ===== INIT =====
    (async function init() {
      await renderStructuredSummary();
      renderNetwork();
    })();
  </script>
</body>
</html>
