<!-- 
  AI Radar 问 AI 组件
  参考 DeepWiki 设计，集成到 graph.html 底部。
  
  功能：
  - 固定在页面底部的悬浮聊天栏
  - 毛玻璃背景效果
  - 场景感知模型选择（快速/深度）
  - 对话历史管理
  - Web 端和手机端自适应

  使用方式：
  1. 在 graph.html 的 </body> 前引入此文件
  2. 配置 API 地址：window.AI_CHAT_API = 'http://localhost:8080'
-->

<style>
  /* ===== AI Chat 组件样式 ===== */
  :root {
    --chat-height: 72px;
    --chat-expanded-height: 400px;
    --chat-bg: rgba(255, 255, 255, 0.85);
    --chat-bg-dark: rgba(30, 30, 30, 0.85);
    --chat-border: rgba(0, 0, 0, 0.08);
    --chat-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);
  }

  /* 固定底部容器 */
  .ai-chat-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    pointer-events: none;
    padding: 8px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  }

  /* 内部卡片 */
  .ai-chat-card {
    pointer-events: all;
    max-width: 768px;
    margin: 0 auto;
    background: var(--chat-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--chat-border);
    border-radius: 16px;
    box-shadow: var(--chat-shadow);
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .ai-chat-card.expanded {
    max-height: 70vh;
    display: flex;
    flex-direction: column;
  }

  /* 折叠状态 - 只显示输入框 */
  .ai-chat-collapsed {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
  }

  .ai-chat-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-primary);
    outline: none;
    resize: none;
    font-family: inherit;
  }

  .ai-chat-input::placeholder {
    color: var(--text-tertiary);
    opacity: 0.7;
  }

  /* 底部工具栏 */
  .ai-chat-toolbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
    border-top: 0.5px solid var(--chat-border);
  }

  .ai-chat-card.expanded .ai-chat-toolbar {
    display: flex;
  }

  /* 场景选择器 */
  .ai-chat-scene-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  .ai-chat-scene-btn {
    background: none;
    border: none;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-tertiary);
    transition: all 0.2s;
  }

  .ai-chat-scene-btn:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .ai-chat-scene-btn.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }

  /* 发送按钮 */
  .ai-chat-send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ai-chat-send-btn:hover {
    background: var(--accent-hover);
    transform: scale(1.05);
  }

  .ai-chat-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .ai-chat-send-btn svg {
    width: 18px;
    height: 18px;
  }

  /* 对话历史 */
  .ai-chat-history {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: var(--surface-soft);
  }

  .ai-chat-card.expanded .ai-chat-history {
    display: block;
    max-height: calc(70vh - 120px);
  }

  .ai-chat-message {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
  }

  .ai-chat-message.user {
    align-items: flex-end;
  }

  .ai-chat-message.assistant {
    align-items: flex-start;
  }

  .ai-chat-bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
  }

  .ai-chat-message.user .ai-chat-bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .ai-chat-message.assistant .ai-chat-bubble {
    background: var(--panel-bg);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* 加载动画 */
  .ai-chat-typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
  }

  .ai-chat-typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    animation: typing 1.4s infinite;
  }

  .ai-chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .ai-chat-typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* 展开/折叠按钮 */
  .ai-chat-toggle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--surface-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ai-chat-toggle:hover {
    background: var(--surface-strong);
  }

  .ai-chat-toggle svg {
    width: 14px;
    height: 14px;
    color: var(--text-tertiary);
    transition: transform 0.3s;
  }

  .ai-chat-card.expanded .ai-chat-toggle svg {
    transform: rotate(180deg);
  }

  /* 手机端适配 */
  @media (max-width: 768px) {
    .ai-chat-container {
      padding: 4px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));
    }
    
    .ai-chat-card {
      border-radius: 12px;
    }
    
    .ai-chat-collapsed {
      padding: 10px 12px;
    }
    
    .ai-chat-input {
      font-size: 14px;
    }
    
    .ai-chat-bubble {
      max-width: 90%;
      font-size: 13px;
    }
  }

  /* 暗黑模式 */
  @media (prefers-color-scheme: dark) {
    :root {
      --chat-bg: var(--chat-bg-dark);
      --chat-border: rgba(255, 255, 255, 0.1);
      --chat-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3);
    }
    
    .ai-chat-message.assistant .ai-chat-bubble {
      background: var(--surface-soft);
      color: #fff;
    }
    
    .ai-chat-history {
      background: var(--bg);
    }
  }
</style>

<div class="ai-chat-container" id="aiChatContainer">
  <div class="ai-chat-card" id="aiChatCard">
    <!-- 对话历史 -->
    <div class="ai-chat-history" id="aiChatHistory">
      <!-- 消息会动态插入 -->
    </div>
    
    <!-- 输入区域 -->
    <div class="ai-chat-collapsed">
      <textarea
        class="ai-chat-input"
        id="aiChatInput"
        placeholder="问 AI 关于今日 AI 情报的问题..."
        rows="1"
      ></textarea>
      
      <button class="ai-chat-toggle" id="aiChatToggle" title="展开对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
      </button>
    </div>
    
    <!-- 工具栏 -->
    <div class="ai-chat-toolbar">
      <div class="ai-chat-scene-selector">
        <span>模型：</span>
        <button class="ai-chat-scene-btn active" data-scene="simple" title="快速回答">
          ⚡ 快速
        </button>
        <button class="ai-chat-scene-btn" data-scene="analysis" title="深度分析">
          🔍 深度
        </button>
      </div>
      
      <button class="ai-chat-send-btn" id="aiChatSendBtn" disabled title="发送">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  
  // 配置
  const API_BASE = window.AI_CHAT_API || '/chat';
  let sessionId = localStorage.getItem('ai_chat_session_id') || null;
  if (!sessionId) {
    sessionId = 'session_' + Date.now();
    localStorage.setItem('ai_chat_session_id', sessionId);
  }
  
  let currentScene = 'simple';
  let isExpanded = false;
  
  // DOM 元素
  const container = document.getElementById('aiChatContainer');
  const card = document.getElementById('aiChatCard');
  const input = document.getElementById('aiChatInput');
  const sendBtn = document.getElementById('aiChatSendBtn');
  const toggle = document.getElementById('aiChatToggle');
  const history = document.getElementById('aiChatHistory');
  const sceneBtns = document.querySelectorAll('.ai-chat-scene-btn');
  
  // 自动调整输入框高度
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    sendBtn.disabled = !this.value.trim();
  });
  
  // 回车发送（Shift+Enter 换行）
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  // 展开/折叠
  toggle.addEventListener('click', function() {
    isExpanded = !isExpanded;
    card.classList.toggle('expanded', isExpanded);
    if (isExpanded) {
      input.focus();
      scrollToBottom();
    }
  });
  
  // 场景选择
  sceneBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      sceneBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentScene = this.dataset.scene;
    });
  });
  
  // 发送按钮
  sendBtn.addEventListener('click', sendMessage);
  
  // 发送消息
  async function sendMessage() {
    const query = input.value.trim();
    if (!query) return;
    
    // 添加用户消息
    addMessage('user', query);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    
    // 添加加载动画
    const typing = addTyping();
    
    try {
      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: query,
          session_id: sessionId,
          scene: currentScene,
        }),
      });
      
      typing.remove();
      
      if (!response.ok) {
        throw new Error('请求失败');
      }
      
      const data = await response.json();
      addMessage('assistant', data.answer);
      
    } catch (error) {
      typing.remove();
      addMessage('assistant', '⚠️ 请求失败，请稍后重试。');
      console.error('AI Chat Error:', error);
    }
    
    scrollToBottom();
  }
  
  // 添加消息到历史
  function addMessage(role, content) {
    const msg = document.createElement('div');
    msg.className = `ai-chat-message ${role}`;
    
    const bubble = document.createElement('div');
    bubble.className = 'ai-chat-bubble';
    bubble.textContent = content;
    
    msg.appendChild(bubble);
    history.appendChild(msg);
    scrollToBottom();
  }
  
  // 添加加载动画
  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'ai-chat-message assistant';
    msg.id = 'typing-indicator';
    
    const typing = document.createElement('div');
    typing.className = 'ai-chat-typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    
    msg.appendChild(typing);
    history.appendChild(msg);
    scrollToBottom();
    
    return msg;
  }
  
  // 滚动到底部
  function scrollToBottom() {
    history.scrollTop = history.scrollHeight;
  }
  
  // 防止输入框被键盘遮挡（手机端）
  input.addEventListener('focus', function() {
    setTimeout(() => {
      container.scrollIntoView({ behavior: 'smooth' });
    }, 300);
  });
  
  console.log('✅ AI Chat 组件已加载');
})();
</script>
