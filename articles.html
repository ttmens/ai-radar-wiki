<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff385c">
<title>AI Radar · 每日深度</title>
<link rel="icon" href="./assets/nexsight-mark.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #08090a;
    --surface: #0f1011;
    --surface-soft: #161718;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --ink: #e8e8e8;
    --ink-soft: #a0a0a0;
    --ink-muted: #6a6a6a;
    --accent: #ff385c;
    --accent-soft: rgba(255,56,92,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo svg {
    width: 28px;
    height: 28px;
  }

  .header-logo h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .header-logo h1 span {
    color: var(--ink-muted);
    font-weight: 400;
    margin-left: 8px;
    font-size: 13px;
  }

  .header-stats {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-muted);
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100vh;
    padding-top: 56px;
  }

  /* ===== Sidebar (Article List) ===== */
  .sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .sidebar-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    padding: 8px 4px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* ===== Article Card ===== */
  .article-card {
    padding: 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(255,56,92,0.15);
  }

  .article-card:hover {
    background: var(--surface-soft);
    border-color: var(--border);
  }

  .article-card.active {
    background: var(--accent-soft);
    border-color: rgba(255,56,92,0.25);
  }

  .article-date {
    font-size: 11px;
    color: var(--ink-muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .article-date .badge {
    background: var(--accent);
    color: #fff;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }

  .article-card.active .badge {
    background: var(--accent);
  }

  .article-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-overview {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .article-meta {
    margin-top: 8px;
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--ink-muted);
  }

  /* ===== Preview Pane ===== */
  .preview {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  .preview-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--ink-muted);
    text-align: center;
    padding: 40px;
  }

  .preview-empty svg {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .preview-empty h3 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--ink-soft);
  }

  .preview-empty p {
    font-size: 13px;
    max-width: 280px;
  }

  .preview iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ===== Mobile Toggle ===== */
  .mobile-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 4px 14px rgba(255,56,92,0.4);
    font-size: 18px;
  }

  /* ===== Mobile Responsive ===== */
  @media (max-width: 768px) {
    .app { flex-direction: column; }

    .sidebar {
      width: 100%;
      min-width: 100%;
      height: calc(100vh - 56px);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .preview {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
      background: var(--bg);
    }

    /* Default: show list */
    #app.show-list .sidebar { transform: translateX(0); }
    #app.show-list .preview { transform: translateX(100%); }

    /* Preview mode: hide list, show preview */
    #app.show-preview .sidebar { transform: translateX(-30%); }
    #app.show-preview .preview { transform: translateX(0); }

    .mobile-toggle { display: none; }

    .header-stats { display: none; }
    .header-logo h1 span { display: none; }

    /* ===== Mobile Back Button - FULL WIDTH bar below header ===== */
    .mobile-back-bar {
      display: none;
    }

    #app.show-preview .mobile-back-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mobile-back-bar button {
      width: 100%;
      height: 48px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 16px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mobile-back-bar button:active {
      background: var(--rausch-active);
      transform: scale(0.98);
    }

    /* Article card - larger tap target */
    .article-card {
      padding: 16px 14px;
      -webkit-tap-highlight-color: rgba(255,56,92,0.15);
      touch-action: manipulation;
    }

    /* Preview content padding for back bar */
    .article-scroll-container {
      padding-bottom: 80px !important;
    }
  }

  /* ===== Loading ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
  }

  .empty-state p { font-size: 13px; }
</style>
</head>

let currentArticle = null;
let isMobilePreview = false;

function isMobile() { return window.innerWidth <= 768; }

function renderArticleList() {
  const list = document.getElementById('articleList');
  const stats = document.getElementById('headerStats');

  if (!ARTICLES || ARTICLES.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>暂无文章，明天 19:00 后将自动生成</p></div>';
    stats.textContent = '';
    return;
  }

  stats.textContent = ARTICLES.length + ' 篇文章';

  let html = '';
  ARTICLES.forEach(function(article, idx) {
    const isActive = currentArticle === idx ? ' active' : '';
    html += '<div class="article-card' + isActive + '" onclick="openArticle(' + idx + ')">';
    html += '<div class="article-date">';
    if (article.isLatest) html += '<span class="badge">最新</span>';
    html += article.date + '</div>';
    html += '<div class="article-title">' + escapeHtml(article.title) + '</div>';
    html += '<div class="article-overview">' + escapeHtml(article.overview || '') + '</div>';
    html += '<div class="article-meta">';
    html += '<span>' + (article.size || '?') + '</span>';
    html += '</div></div>';
  });

  list.innerHTML = html;
}

function openArticle(idx) {
  const article = ARTICLES[idx];
  if (!article) return;

  currentArticle = idx;
  renderArticleList();

  const preview = document.getElementById('preview');
  const empty = document.getElementById('previewEmpty');
  if (empty) empty.remove();

  // Show loading
  preview.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

  // Decode embedded article content (UTF-8 safe base64 decode)
  try {
    // Decode base64 to bytes, then decode as UTF-8
    const binary = atob(article.content);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    const html = new TextDecoder('utf-8').decode(bytes);

    const container = document.createElement('div');
    container.className = 'article-viewer';
    container.innerHTML = html;
    container.style.cssText = 'width:100%;height:100%;overflow-y:auto;padding:40px 60px;background:#ffffff;color:#333;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.8;font-size:16px;max-width:800px;margin:0 auto;box-sizing:border-box;';

    // Style the article content
    const style = document.createElement('style');
    style.textContent = `
      .article-viewer h1 { font-size: 24px !important; font-weight: bold !important; color: #000 !important; margin-bottom: 10px !important; }
      .article-viewer h2 { font-size: 20px !important; font-weight: bold !important; color: #000 !important; margin-top: 30px !important; margin-bottom: 10px !important; }
      .article-viewer h3 { font-size: 18px !important; font-weight: bold !important; color: #000 !important; margin-top: 20px !important; margin-bottom: 8px !important; }
      .article-viewer p { margin-bottom: 16px !important; }
      .article-viewer a { color: #ff385c !important; }
      .article-viewer ul, .article-viewer ol { padding-left: 20px !important; margin-bottom: 16px !important; }
      .article-viewer li { margin-bottom: 8px !important; }
    `;
    container.prepend(style);

    // Wrap in a scrollable container
    const wrapper = document.createElement('div');
    wrapper.className = 'article-scroll-container';
    wrapper.style.cssText = 'width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;';
    wrapper.appendChild(container);

    preview.innerHTML = '';
    preview.appendChild(wrapper);
  } catch (e) {
    preview.innerHTML = '<div class="preview-empty"><h3>解析失败</h3><p>' + escapeHtml(e.message) + '</p></div>';
  }

  // Mobile: switch to preview
  if (isMobile()) {
    isMobilePreview = true;
    const app = document.getElementById('app');
    app.classList.remove('show-list');
    app.classList.add('show-preview');
  }
}

function goBack() {
  isMobilePreview = false;
  const app = document.getElementById('app');
  app.classList.remove('show-preview');
  app.classList.add('show-list');
}

function toggleMobileView() {
  const app = document.getElementById('app');
  if (isMobilePreview) {
    isMobilePreview = false;
    app.classList.remove('show-preview');
    app.classList.add('show-list');
  } else {
    if (currentArticle !== null) {
      isMobilePreview = true;
      app.classList.remove('show-list');
      app.classList.add('show-preview');
    }
  }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Init
renderArticleList();

// Handle mobile initial state
if (isMobile()) {
  document.getElementById('app').classList.add('show-list');
}
</script>
